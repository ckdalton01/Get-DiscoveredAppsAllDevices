<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intune Discovered Apps - Configuration</title>
    <style>
        :root {
            /* Colors - Patch My PC Design System */
            --color-primary: #1BBC9B;
            --color-primary-hover: #11A486;
            --color-secondary: #0490DA;
            --color-secondary-hover: #007FC2;
            --color-tertiary: #ABADCF;
            
            --bg-900: #151521;
            --bg-800: #1E1E2D;
            --bg-700: #2A2A3C;
            
            --text-primary: #FFFFFF;
            --text-secondary: #858D97;
            
            --color-success: #50CD89;
            --color-warning: #FFC700;
            --color-error: #F1416C;
            
            --font-family: 'Poppins', system-ui, sans-serif;
            
            --transition-fast: 150ms ease;
            --transition-normal: 300ms ease;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-900);
            color: var(--text-primary);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: var(--bg-800);
            border-radius: 8px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }

        /* Header */
        .header {
            background-color: var(--bg-700);
            padding: 30px 20px;
            border-bottom: 1px solid var(--bg-700);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Content */
        .content {
            padding: 30px 20px;
        }

        /* Form Group */
        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-group .hint {
            font-size: 12px;
            color: var(--text-secondary);
            font-style: italic;
            margin-bottom: 8px;
        }

        /* Input */
        input[type="text"],
        input[type="search"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--color-tertiary);
            border-radius: 4px;
            font-family: var(--font-family);
            font-size: 14px;
            background-color: var(--bg-700);
            color: var(--text-primary);
            transition: all var(--transition-fast);
        }

        input[type="text"]:focus,
        input[type="search"]:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgb(27 188 155 / 0.15);
        }

        /* Checkboxes Container */
        .checkboxes {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Custom Checkbox */
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background-color: var(--bg-700);
            border: 1px solid var(--color-tertiary);
            border-radius: 4px;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .checkbox-wrapper:hover {
            background-color: rgba(27, 188, 155, 0.1);
            border-color: var(--color-primary);
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--color-primary);
        }

        .checkbox-wrapper label {
            flex: 1;
            margin: 0;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
        }

        /* Info Box */
        .info-box {
            background-color: var(--bg-700);
            border-left: 4px solid var(--color-secondary);
            padding: 16px;
            border-radius: 4px;
            margin-top: 24px;
        }

        .info-box h3 {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .info-box p {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 1px;
            font-family: var(--font-family);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            user-select: none;
        }

        button:focus-visible {
            outline: 2px solid var(--color-primary);
            outline-offset: 2px;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-primary);
            border: 1px solid var(--color-primary);
        }

        .btn-secondary:hover:not(:disabled) {
            background-color: var(--color-primary-hover);
            border-color: var(--color-primary-hover);
        }

        .btn-primary {
            background-color: var(--color-primary);
            color: var(--text-primary);
            border: none;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: var(--color-primary-hover);
            box-shadow: var(--shadow-md);
        }

        /* Status Message */
        .status-message {
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 13px;
            display: none;
        }

        .status-message.show {
            display: block;
        }

        .status-message.success {
            background-color: rgba(80, 205, 137, 0.1);
            color: var(--color-success);
            border-left: 4px solid var(--color-success);
        }

        .status-message.error {
            background-color: rgba(241, 65, 108, 0.1);
            color: var(--color-error);
            border-left: 4px solid var(--color-error);
        }

        .status-message.warning {
            background-color: rgba(255, 199, 0, 0.1);
            color: var(--color-warning);
            border-left: 4px solid var(--color-warning);
        }

        .status-message.info {
            background-color: rgba(27, 188, 155, 0.1);
            color: var(--color-primary);
            border-left: 4px solid var(--color-primary);
        }

        /* Code Output */
        .code-output {
            background-color: var(--bg-900);
            border: 1px solid var(--bg-700);
            padding: 16px;
            border-radius: 4px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            color: var(--color-success);
            max-height: 200px;
            overflow-y: auto;
            margin-top: 16px;
            display: none;
        }

        .code-output.show {
            display: block;
        }

        @media (max-width: 600px) {
            .container {
                border-radius: 0;
            }

            body {
                padding: 0;
            }

            .content {
                padding: 20px;
            }

            button {
                font-size: 13px;
                padding: 10px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Script Configuration</h1>
            <p>Configure and run the Intune Discovered Apps script</p>
        </div>

        <div class="content">
            <div class="status-message" id="statusMessage"></div>

            <form id="configForm">
                <!-- Display Name Input -->
                <div class="form-group">
                    <label for="displayName">Filter by App Name (Optional)</label>
                    <div class="hint">Use * for wildcards (e.g., 'Java*' or '*Chrome*')</div>
                    <input 
                        type="text" 
                        id="displayName" 
                        name="displayName"
                        placeholder="Leave blank to include all apps"
                        autocomplete="off"
                    >
                </div>

                <!-- Export Options -->
                <div class="form-group">
                    <label>Export Options</label>
                    <div class="checkboxes">
                        <div class="checkbox-wrapper">
                            <input type="checkbox" id="csvSwitch" name="csv">
                            <label for="csvSwitch">Export as CSV (Default: Excel)</label>
                        </div>

                        <div class="checkbox-wrapper">
                            <input type="checkbox" id="buildGroupSwitch" name="buildGroup">
                            <label for="buildGroupSwitch">Build Dynamic Device Group</label>
                        </div>
                    </div>
                </div>

                <!-- Info Box -->
                <div class="info-box">
                    <h3>ℹ️ Info</h3>
                    <p>The script will retrieve all discovered applications from Intune and generate a comprehensive report. This may take several minutes for large environments.</p>
                </div>

                <!-- Code Preview -->
                <div class="code-output" id="codeOutput"></div>

                <!-- Buttons -->
                <div class="button-group">
                    <button type="reset" class="btn-secondary">Clear</button>
                    <button type="button" class="btn-primary" id="generateBtn">Generate Command</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('configForm');
        const displayNameInput = document.getElementById('displayName');
        const csvSwitch = document.getElementById('csvSwitch');
        const buildGroupSwitch = document.getElementById('buildGroupSwitch');
        const statusMessage = document.getElementById('statusMessage');
        const codeOutput = document.getElementById('codeOutput');
        const generateBtn = document.getElementById('generateBtn');

        function buildCommand() {
            const scriptPath = "./Get-DiscoveredAppsAllDevices.ps1";
            let command = `& '${scriptPath}'`;
            const args = [];

            if (displayNameInput.value.trim()) {
                args.push(`-DisplayName '${displayNameInput.value.trim()}'`);
            }

            if (csvSwitch.checked) {
                args.push('-CSV');
            }

            if (buildGroupSwitch.checked) {
                args.push('-BuildGroup');
            }

            if (args.length > 0) {
                command += ' ' + args.join(' ');
            }

            return command;
        }

        function updatePreview() {
            const command = buildCommand();
            codeOutput.textContent = command;
        }

        function showStatus(message, type = 'info') {
            statusMessage.textContent = message;
            statusMessage.className = `status-message show ${type}`;
            setTimeout(() => {
                statusMessage.classList.remove('show');
            }, 5000);
        }

        // Event Listeners
        displayNameInput.addEventListener('input', updatePreview);
        csvSwitch.addEventListener('change', updatePreview);
        buildGroupSwitch.addEventListener('change', updatePreview);

        generateBtn.addEventListener('click', () => {
            const command = buildCommand();
            codeOutput.classList.add('show');
            
            // Copy to clipboard
            navigator.clipboard.writeText(command).then(() => {
                showStatus('✓ Command copied to clipboard!', 'success');
            }).catch(() => {
                showStatus('Command ready. Copy it manually from below.', 'warning');
            });

            updatePreview();
        });

        form.addEventListener('reset', () => {
            codeOutput.classList.remove('show');
            statusMessage.classList.remove('show');
        });

        // Initialize
        updatePreview();
    </script>
</body>
</html>
